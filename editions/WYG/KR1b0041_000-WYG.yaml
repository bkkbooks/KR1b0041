body:
  text: 尚書砭蔡編書類提要臣等謹案尚書砭蔡編一卷明袁仁撰仁字良貴號蓡波蘇州人與李本同時相善故解經亦往往似本是編糾蔡沈書傳之誤所論如粤若越若之前後異訓三百六旬有六日乃宋厯非古厯方命當從蜀志晉書所引梅賾事不出晉書宣夜有漢郗萌所傳非無師説并州不在冀東醫無閭即遼東不得既為幽州又為營州鳥鼠同穴實有其事用爽厥師爽訓失説築傳巖為版築遯於荒野為甘盤西伯戡黎為武王四輔非三輔之義洪舒通作洪荼虎賁不掌射御荒度作刑不連耄字為句皆確有所據至謂史記索隠南譌不作為字則但據今本不格姦為不止其姦鮮食非肉食怪石為資服餌汨陳之訓陳為舊則有意立異不可為訓矣朱􅂜尊經義考載此書註曰未見此本載曹溶學海類編中題曰尚書蔡註考誤案沈道原序亦稱砭蔡編則經義考所題為是溶輯學海類編多改易舊名以示新異不足為據也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ad59024ee30ba83c8f85cb5e18ebe98dbbe2f25da771cbe2034b5c14d8d95b05
