body:
  text: 尚書砭蔡編明袁仁撰曰若稽古帝堯蔡傳曰粵越通古文作粵此即安國𨽻古文又稱曰若為發語辭引周書越若來為例及訓召誥則曰越若來者迤邐而來也豈不自悖其例乎疏謬甚矣平秩南訛平在朔易蔡傳南訛史記索隱作南為史記索隱現在皆作南訛未嘗作為也論其義則動也謂耘耕之類朔易者頒新朔以換舊朔也以訛為變化又以朔為死而復蘇皆牽強期三百有六旬有六日蔡注天體至圓一段皆據宋時厯法言之堯時不然今時亦不然十有九嵗七閏氣朔分齊是為一章惟觀天紀元等厯為然今十九嵗已有餘分不能齊矣咨四嶽四嶽者四方諸侯之長按左傳許為太嶽之後明矣僉曰鯀哉其非一人可知孔平仲乃謂四嶽為一人掌知四方之事而蔡傳因之謬矣方命圮族方字古放字蓋二字通用者蜀志晉書引古文尚書並作放命圯族鄭康成謂放棄君命是矣今云圓則行方則止恐太穿鑿否德忝帝位注否不通謂否與不相通也欠一與字學者遂誤認不通為否昔講官在經筵上講此書云否是不通的意思聞者不覺失笑蒸蒸乂不格姦決當主王伯安之説蒸謂以誠意薰蒸之蒸蒸者薰而又薰也乂治也格正也不格姦者不去正他姦惡也大人正已而物正並無正物工夫此最可為處頑之法若云不至大為姦惡則舜娶堯女之後象猶日以殺舜為事其姦惡何大耶舜典東晉梅頥一段全用孔氏疏檢晉書無之惟隋經籍志載此事又查姚乃姚興其方字連下讀大航原作大桁其謬誤如此納于大麓烈風雷雨弗迷孔傳云麓録也納舜使大麓萬機之政隂陽和風雨時各以其節不有迷錯愆伏明舜之德合于天此非安國之臆説也孔叢子載宰我問云納于大麓烈風雷雨弗迷何謂也孔子曰此言人事之應乎天也堯既得舜歷試諸難已而納之于尊顯之官使大麓萬機之政是故隂陽清和五氣來備烈風雷雨各以其應不有迷錯愆伏明舜之行合于天也安國正本其説蔡不從而據史記以為納山麓按桓談新語昔堯試舜于大麓者顧録天下事若今之尚書矣王充論衡云大麓三公之位也居一公之位大總録三公之事長廣王禪廣陵文云允執其中入光大麓皆明證也程伊川亦云若司馬遷謂納舜于山麓豈有試人而納于山麓耶此只是歷試舜也在璿璣玉衡以齊七政按釋詁以璿為美玉正義謂璿是玉之别稱注美珠謂之璿誤也又言天體者三家一曰周髀二曰宣夜三曰渾天此當以周髀為最其本庖犧氏立周天厯度其所傳則周公受于殷人者故曰周髀髀者股也今所傳勾股法是已算天必用勾股雖渾天不能廢也宣夜孔疏云宣明也夜幽也幽明之數其術兼之按漢祕書郎郗萌曾傳其術記其師説云天無質仰而瞻之高逺無極眼瞀精絶故蒼蒼然也譬之旁望逺道之黃山而皆青俯察千仞之深谷而窈黑夫青非真色而黑非有體也日月衆星浮生虛空之中其行其止皆須氣焉是以七曜或逝或住或順或逆伏現無常進退不同由乎無所根繫也故辰極常居其所不與衆星西沒也攝提填星皆東行曰行一度月行十三度遲疾任情無所繫著晉志載之甚詳今曰宣夜絶無師説不知其狀如何則淺陋甚矣禋于六宗歐陽及大小夏侯説尚書皆云所祭者六上不謂天下不謂地旁不謂四方在六者之間助隂陽變化實一而名六宗矣孔光劉歆以六宗謂乾坤六子水火雷風山澤也賈逵謂六宗天宗三日月星辰地宗三河海岱也馬融云萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏此謂六宗鄭玄以六宗言禋與祭天同名則六者皆是天之神祗謂星辰司中司命風師雨師也晉初幽州秀才張髦上表稱宗祀祖考所尊者六乃三昭三穆也司馬彪又上表以為天宗者日月星辰寒暑之屬地宗社稷五祀之屬紛紛異説蔡傳宗孔以祭法六者當之按祭法所云鄭以為皆祈禱之祭則不可用以解此經宜依歐陽大小夏侯庶為近之五玉注謂五玉即上文五瑞誤矣蓋此五玉乃諸侯所執以為贄者若五瑞則天子之命圭諸侯世守以為瑞信者豈有贄見之禮而乃獻其世守之圭耶肇十有二州注稱始分冀恆山之地為並州按夏官職方氏云正北曰並州山鎮曰恆山朱子語類云分冀州西為並州考禹迹圗及地理指掌圗並州皆在冀州之西通典云並州左有恆山之險右有大河之圗則在冀西明矣今曰冀東誤也注又稱其分東北醫無閭之地為幽州分青之東北遼東等處為營州按醫無閭在遼東今云分醫無閭之地為幽州即遼東之地矣又云分遼東等處為營州不可解爾雅曰齊曰營州指掌圗云舜肇分為十二州蓋以古冀州南北濶大分衛水為並州衛水在今真定府分燕以北為幽州今密雲等處正是幽州鄒衍吹律處及其工城皆在密雲當依指掌圗為正其曰冀州止河東一路尤謬按宋河東路所管平陽隆德平定太原府澤寧化岢嵐汾遼絳隰火山靖康代欣石憲麟豐保德二十一郡皆並州之境且汾晉之地自史漢而下皆以為並輿地所載沿革甚詳何其不考之甚也象以典刑注謂象如天之垂象以示人似也至以墨劓剕宫大辟為五刑則誤矣吕刑謂苖民始作五虐之刑爰始淫為劓刵椓黥則舜時無是法也特畫象于服以辱之耳慎子云有虞之誅以幪巾當墨草纓當劓菲履當剕鞾闕當宫布衣無領當大辟漢武詔曰堯舜畫衣冠而民不犯正謂此也金作贖刑孔氏傳云黃金銅也吕刑其罰千鍰注曰黃鐡亦是銅古之贖罪者皆用銅漢始用黃金但少其斤兩令與銅相敵按金通五金古者黃金謂之蕩白金謂之銀故以銅為黃金今宜直注曰銅五刑有服五服三就服即幪巾之類青緑一匝曰就周禮大輅盤纓七就可據也若以服為服其罪豈流者不應服罪耶分北三苖按虞仲翔云北古别字蓋舜時天下咸服惟苖未化今得分别而去留之也則黜陟之典亦得行于負固之夫盛矣陟方乃死陟行也即太甲陟遐之陟方即方域之方謂舜巡行四方而死于蒼梧之野也若以陟為升遐則與下乃死重復矣宰我問帝舜子曰有虞三十五年在位嗣帝五十載陟方嶽死于蒼梧之野而葬焉魯語展禽曰舜勤民事而野死韋昭注謂征有苖死于蒼梧之野吳都賦烏聞梁岷有陟方之館行宫之基歟劉淵林注書云舜陟方謂南巡狩也其證甚明祗承于帝此句宜連下曰字讀不宜分章祗承于帝者言舜有是意而禹承之也任賢勿二去邪勿疑二對疑字説即疑二之二一心任賢表裏無間始終無間言與行亦無間故曰勿二若云勿以小人間之則又是去邪之事矣無怠無荒倦勤曰怠廢棄曰荒始于逸豫終于荒蕪只此一心今分無怠于心無荒于事于理未安戒之用休董之用威古注疏云人雖為善或寡令終故當戒勑之念用美道使民慕美道行善又督察之用威罰言其不善當獲罪此訓甚正今若謂勤于是者戒怠于是者董則非矣豈有勤而反戒者乎夫戒者禁懲之詞也今反用休是于禁懲之中而寓以美善之旨董者督率之義也今反用威是于督率之內而示以嚴畏之機此二句原有妙義况當聖世勤者必多然未必其有終注疏人雖為善或寡令終最為得旨罪疑惟輕功疑惟重與其殺不辜寧失不經注云二者皆非聖人至公至平之意此誤説也聖人之心好生為主其賞罰功罪必如此而後為至公必如此而後為至平此罔愆之德也安得有過哉人心惟危道心惟微心只有一箇自人而言則曰危自道而言則曰微若曰一心為主一心又在傍邊聽命萬無此理吁惟帝其難之知人則哲能官人安民則惠黎民懷之能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬蔡謂吁者嘆而未深然之詞謬也禹深然臯陶之言而有所感慨故以吁發之惟帝其難之帝指舜非指堯也歡兜有苗共工之事皆不在堯時禹言知人安民惟舜難行所謂責難于君也四凶之誅惟鯀之殛于禹有深痛焉故言能知人則明通燭照能官人矣言外就有姦人不用之意能安民則德澤沾洽黎民懷之矣言外就有小人不能害民及黎民愛戴小人不能搖惑之意既哲而又惠頑讒且有並生之慶矣故曰何憂何遷何畏上則責難于帝下則思厄于親此禹之所深嗟而長吁也暨益奏庶鮮食暨稷奏庶艱食鮮食民以食為天水患初平耕耨未溥自生之少則曰鮮食自得之難則曰艱食今乃謂血食曰鮮誤矣蓋自燧人氏作而民已久知熟食若謂進衆鳥獸魚鱉之肉于民使食以充飽豈九州之鳥獸魚鱉皆益取之以進民乎且奏庶鮮食則以庶為衆鳥獸矣奏庶艱食則庶又何所指乎竊謂奏即敷奏之奏庶即民庶也治水之時嘗同益陳奏民庶鮮食則所以廣其生植之源者何不用也又嘗同稷陳奏民庶艱食鮮食則所以貽其豐亨之利者何不為也奏之者在臣而所以行之者在君禹不敢自以為功而稱及二臣又不敢以為臣下之功而歸之于帝可為萬世告君之法此書以益稷名篇此二句極重安汝止惟幾惟康心不離事注就事物上説止良是大意安汝之止惟在乎幾惟在乎康幾康二字不平幾者審之于微康者求其妥帖由幾而康康字正應安字女毋面從退有後言面從是將順之意後言謂有言不盡而懷忠以退也面不能直諫退雖有言無及矣若謂面諛以為是而背毁以為非殊非唐虞景象若不在時侯以明之若如也在察也時是也謂庶頑讒説之人一不能察害治不小如不能察于是須于鄉射時辨别之蓋射以觀德心正則比于禮樂心邪則否古人用此為觀人之具俞哉俞者然其言也哉者助語辭今以為口然而心不然誤矣臯陶象刑原聖世不可少者况禹有此功敘陶承其敘而明刑以輔之又非徒尚刑威者禹如何而不然之耶於豫擊石拊石於音烏嘆美聲尚書中凡語助之于皆作于作於者皆音烏如黎民於變是也禹敷土考工記云凡溝逆地阞謂之不行水屬不理孫謂之不行注溝謂造溝阞謂脈理屬讀為注孫順也按治水之法莫先于造溝所謂掘地而注之海也凡造溝必察地之脈絡必順地之條理逆之水必不行禹敷土者正辨别土之阞與理也若分别九州則九州之野各有定疆何待分别耶夾右碣石入于河傳稱碣石昔在河口海濱故以志其入貢河道歷世既久為水所漸淪入于海已去岸五百餘里矣此謬也今永平府撫寧縣西南有山逺望穹窿似塜山頂有石特起如柱此碣石也離海三十里蓋古滄州與平州相對自滄州望之則離岸五百里而自平州言之則三十里耳北邊貢賦之來在五百里之海之內行舟則碣石正在其右蔡止據滄州志而不考其實遂謂九河皆淪入于海誤矣傳又言遼濡沱易之水皆中髙不與河通此亦誤按濡滹易三水去帝都近縱使入河亦不由行况滹易在禹時原舊入河後河徙而南始入海耳遼水自塞外三萬衛西北入遼東境南經鐡嶺瀋陽都司之西廣寧之東又南至海州衛西南入海灉沮會同蔡引曾眺二説以為未知孰是按曾稱汳水受陳留浚儀隂溝至蒙為灉水即汳水也今考浚儀隂溝在河南開封府祥符縣其地有浚儀橋蒙亦祥符地今有大蒙城小蒙城在隂溝之東汳流至此名為灉睢水一在開封陳留縣經睢州寧陵一在本府夏邑縣經永城縣至南直𨽻宿州二水皆豫徐之水與兖無干其謬顯然從眺説河出為灉濟出為沮者近之朝宗會同皆諸侯見天子之名厥賦貞作十有三載乃同堯舜什一之制乃萬古中正之法重乎此者為桀而輕乎此者為貊蓋非惟不可增即減之亦非也若謂賦以薄為正殊非大道朱氏曰貞者隨所卜而後定之之名也蓋即貞悔之貞兖地最卑沮洳難去與他州不同水患雖平盈虛未卜故必作十有三載歷歷試之然後得其一定之法而賦始年年齊矣必十三年者按史記太嵗在子旱明嵗美至卯穰明嵗衰惡至午旱明嵗美至酉穰明嵗衰惡蓋歷十二辰而豐儉可定始可得其大同之法也浮于濟漯達于河既云漯者河之支流則即今在章丘者是也故道尚存又謂出東郡東武陽至千乘入海則又是一漯矣此乃出東昌府華縣即東武陽也至青州府博興縣入海與河不通安能達于河乎鉛松怪石怪石乃石之竒而有用者如陽起石以之傳物則見日而飛雲毋石煉而成粉則靈而可餌此類皆竒而適用所不可少者故制之為貢以其種類不一故總曰怪石非玩好之具也三江即入注以淞江東江及婁江為三江大謬此當以經文為據漢自北入則曰北江彭蠡自南入則為南江而岷江即為中江蘇子瞻及近世邵寶之説皆同闕程氏據西域傳以弱水在條支去長安一萬二千餘里蔡以其逺而非之似矣然而未當也韓氏嘗辨之云江漢之水禹治于荆則自荆而下揚州之域禹固未嘗治之然謂揚之江漢非荆之江漢不可也禹之所治雍地之弱水也謂之既西則源東而流西矣弱水出西海之山西海今在陜西西寧衛城西三百里其海方數百里跨夏夷之地而窮石之山當闕海之左右自東而西一千五百里至甘州古闕地過合黎山又五百一十里至蕭州古酒泉地又八百餘里至沙州古燉煌地以上皆雍地也又二萬餘里至條支以入西海此西海非前弱水所出之西海也蔡傳誤認後西海為弱水所出故非之禹之導者雍之弱水也荒逺之外禹蓋未嘗至也豈可以禹未至而遽疑其非一水耶導黑水黑水出犍為郡南廣縣汾關山符即今敘州府慶符縣以舊志有山符二字故縣以慶符名今慶符有黑水然蔡傳竟遺一符字疏略之甚又稱水之黑以榆葉積漬所成益謬梁之黑水出葉榆澤葉榆即西珥海其地有黑水祠在今雲南大理府點蒼山滙為巨湖周三百里若雍之黑水五六各異源安得皆為榆葉所浸哉嶓冡導漾東流為漢又東為滄浪之水過三澨至于大别南入于江東滙澤為彭蠡東為北江入于海蔡傳據常氏之説謂鞏昌之漢為東源三泉之漢為西源又謂西縣為東源是以西縣為鞏昌矣不知鞏昌去西縣一千八百里三泉在西縣之東豈可以鞏昌為東源耶據實考之漢水出陜西鞏昌府嶓冡山為漾水東流至西和縣即入武都上祿之地名為西漢水又東流至成縣即武都郡治名東漢水折而稍西折而東南入漢中府鳯縣過沔縣西别為潛又東合沔水東流經本府洋縣流入湖廣襄陽府鄖縣至均州為滄浪之水歷光化襄陽宜城荆州府荆門州潛江縣至沔陽州至三澨漢澨漳澨􅱀澨故曰三澨在今京山縣西八十里至漢陽縣大别山南流合岷江東至江西南康府星子縣滙澤為彭蠡東為北江至南直𨽻通州入海曰東滙曰東為者言漢自西東流而滙為彭蠡又東流而北江非謂溪之東邊也蔡傳之所疑者皆非蓋江漢既經彭蠡則彭蠡之水言滙何妨且此先言漢則自當以為漢滙後言江則自當以江為會江漢合流漢水原在北故曰北江漢在北既言彭蠡為漢滙則江之來自當稱北會也岷山導江東别為沱又東至于澧過九江至于東陵東迤北會為滙東為中江入于海江水自西川成都府茂州岷山發源西南至威州過汶川轉而東南至灌縣過金口至新津縣合皂江水入敘州府宜賔縣與馬湖江合東北入瀘州合江縣東北入重慶府巴縣經涪州合州黔江忠州入夔州府萬縣雲安奉節經瞿塘硤入湖廣荆州府歸州出硤歷夷陵宜都公安石首入沔陽州過雲夢入武昌府嘉魚縣經江夏縣東會漢水南過武昌縣入嶽州府巴陵縣過洞庭湖東至武昌府咸寧縣東入江西九江府德化縣入南康府星子縣過鄱陽湖入南直𨽻安慶府懷寧縣經池州東流縣東入太平府當塗縣入和州為橫江入應天府上元江寧入揚州府經儀真縣北則歷泰州至通州南則歷常州府江隂縣至常熟入海此實録也注太略導渭自鳥鼠同穴蔡謂鳥鼠為同穴之枝山誤矣鳥鼠同穴既是二山導山必自本而枝豈有先導枝山之理又孔氏鳥鼠共為雌雄同穴而處蔡斥為不經按釋文云鳥鼠同穴其鳥為鵌其鼠為鼵鵌鼵鳥鼠之名其處一穴天性然也郭璞云鼵如入家鼠而短尾鵌似鵽而小黃黑色穴入地三四尺鼠為內鳥在外今人有入是山而親見之者宇宙之間何所不有安得以已所不見而遂疑其為怪也大戰于甘注稱啓與有扈戰甘之野據書序史記也説苑子貢稱禹與有扈氏三戰不服修德一年有扈請服莊子亦稱禹攻有扈國為虛厲逸周書亦稱有夏之方興扈氏弱不恭身死國亡墨子引甘誓之文則稱禹誓然則戰于甘者禹也非啓也怠棄三正注以三正為子丑寅之正非也夏正建寅只奉夏正可矣豈欲其兼殷周子丑之正而悉遵奉乎孔傳以為怠隋廢棄天地人之正道斯為得之管見謂禹養民莫重于六府三事威侮五行是不修六府怠棄三正是不務三事亦通威克厥愛允濟李靖兵法云臣按孫子曰卒未親附而罰之則不服已親附而罰不行則不可用此言凡將先有恩愛洽于士心然後可以嚴刑也若愛未加而獨用峻法鮮克濟焉太宗曰尚書之威克厥愛允濟愛克厥威允罔功何謂也靖曰愛設于先威行于後不可反是也若威加于前愛救于後無益于事矣尚書所以慎戒其終非所以作謀于始也故孫子之法萬代不刋豫謂李衛公在兵中久極知軍情故以尚書聖人之言彼不敢信豫謂書言不錯解書者誤耳克能也商書克寬克仁蓋寬不難克寬為難如素無厚德將有欲為寬而不能者矣威克厥愛者謂其心一於慈祥於威之中而能愛故允濟愛克厥威者謂其心一於慘刻於愛之中而能威故允罔功如此看方與上文天吏逸德烈于猛火脅從罔治咸與惟新之旨相合纘禹舊服服即禹弼成之五服孔傳云繼禹之功統其故服是也蔡解以為繼禹舊所服行恐非至下兹率厥典乃是循禹所行之道用爽厥師墨子引書云夏人矯天命布命于下帝伐之惡龔喪厥師據此則爽當作喪言上天不善夏桀之所為用湯受命而使夏喪失其衆也詩云女也不爽則爽字亦訓為失即不改字而以失訓之更覺妥帖若訓為明未安爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗注勿以小善而不為勿以小惡而為之文同而異解經文之意只云爾惟德毋謂小而不為也萬邦之慶基于一念之微爾惟不德毋謂大而後戒也厥宗之墜實本于一念之惡自周有終相亦惟終竟以忠信為周于理可通于文不類周者無缺漏之意由忠信而出者也人有偽則不勝其缺漏矣按古篆文周字與君字相類當曰自君有終相亦惟終此必字之相類而訛者王徂桐宫居憂世傳伊尹以臣放君稽之經文殊不然古禮君薨聽于冡宰新主宅憂亮隂三年太甲以孫繼祖位未能率德伊尹恐其居宫燕逸故營桐宫于成湯之墓奉王居憂其間以終三年之喪使之密邇先王逺離寺婦以成就君德正是遵行古禮何嘗放君哉朕承王之休無斁斁字不可作厭字看臣豈有厭君之理只是無窮極之意聒聒起信險膚聒聒説文引作懖懖蓋自用之意似勝蔡傳豫亦拙謀作乃逸拙字説文作炪謂火明也言我今遷都深知其利于汝譬若舉火然明為汝造安逸也人惟求舊器非求舊惟新蔡謂盤庚所引其意在人惟求舊一句非也以遷都言之則器非求舊惟新亦是切喻觀下失于政陳于兹之戒可見矣鞠人謀人之保居蔡謂鞠人謀人未詳或曰鞠養也謀字不訓竊謂鞠育其民謀處其民便得安居也即敢恭生生之意説築傅巖之野惟肖孔氏舊注傳氏之巖在虞虢之界通道所經有間水壞道常使胥靡刑人築護此道説賢而隱代胥靡築之以供食皇甫謐云高宗夢天賜賢人胥靡之衣蒙之而來寫其形象求之天下果見築者胥靡衣褐帶索執役于傅巖之野孟子亦云傅説舉于版築之間舊説是也蔡以築為居無據既乃遁于荒野自河徂亳暨厥終罔顯遁于荒野蘇軾以為甘盤遁去極是蓋盤嘗為高宗之師後乃遁居荒野武丁遣使求訪故不安居一處遂自河徂亳厥終罔顯者晦其迹而不知所往也汲冢周書謂盤庚自奄遷于北蒙十五年而營殷邑小辛小乙武丁迄庚丁皆因之至武乙三年復自殷遷河北十五年又自河北而遷沫然則自河徂亳又何嘗是武丁事哉若謂其學絶無顯明益陋矣惟斆學半念終始典于學厥德修罔覺受教曰斆此訓最精高宗序學于甘盤至克邁乃訓皆資之人者説因言學于古訓欲其反諸已也蓋學古是尚友古人須以我之精神通于千古之上故須孫志以求允懷以俟而後道始實有諸躬也然積諸躬又不若志諸心故云惟受教于人于為學之道止居其半半須自得念謂心念典主也此心自始及終常主于學則精神既到修證俱融故曰厥德修罔覺罔覺之覺乃為真覺學不至是未逼真西伯戡黎蔡據史記以為文王事非也金仁山胡五峰吕成公陳少南薛季龍皆以為武王事而吳氏以戡黎之師在伐紂之時尤得旨王伯厚曰商都朝歌黎在上黨壺關乃河朔險要之地朝歌之西境密邇王畿黎亡則商震矣故武王渡孟津莫之或禦此祖伊所以恐而奔告也厥後周以商墟封衛狄入黎侯而衛不救唇亡齒寒遂為狄所滅是知黎為商都要關而戡黎為武王伐紂時事無疑矣我其發出狂狂字乃往字之誤史記宋世家作發出往注引鄭玄云我其起作出往是也若以顛狂釋之恐無此理罪合于一不辨淑慝一切誅之故曰罪合于一武成蔡氏考定武成皆本劉氏王氏程子之説然虛心讀之即不改亦自可通自一月壬辰以下言初伐商也厥四月哉生明以下言既伐商也見不久而商平即一戎衣天下大定之意丁未一節言歸而祀神既生魄節言歸而覲臣覲臣不可以先祀神故其序如此既覲臣不可不告詔之故惟先王建邦啓土以下皆告詔羣臣述其既往之事也恭天成命一節亦告神之詞列爵一節則記其致治之法耳以今日而敘往日之事所以月日前後不倫不足疑也汩陳其五行蔡訓汩為亂訓陳為列似矣然言五行亂其列則通若曰亂列其五行則難通矣愚謂汩沒也陳久也亦腐也即盤庚失于政陳于兹之陳承上鯀堙洪水來言汩沒久壞其五行也堙者障而塞之之謂禹治水只是疏濬鯀只是堙塞今河北有鯀隄無禹隄此一徵也既堙洪水則木不得茂土不得乾金不得顯火不得明故曰汩陳其五行然則今之治水築隄之外别無長䇿皆鯀之流也天乃錫禹洪範九疇洛書與洪範無干若謂天錫洛書因禹而第九疇甚無謂此天錫與天乃錫王勇智同平康正直平康者無習俗氣質之偏而與皇極為一者也錫以正直之福則進而登諸位矣詩云靖共爾位好是正直是也日月之行則有冬有夏注稱極北至于牽牛則行黑道極南至東井則行赤道夫黑道赤道乃後人所抹以紀天行之度者不宜以之訓經况惟宋時冬至日在牛今已在虛矣當殷周時其行度亦有異當刪去無疑我其為王穆卜穆卜者閟宫肅穆之內謀卜于祖先以決大疑也周書文酌解篇伐有三穆其一絶靈破城其二筮竒昌為其三龜從兆凶此穆卜之法也絶靈破城者謂滅人之國覆絶其祖先之靈攻破其所都之城也蓋武王克商未久遽遘危疾二公以絶靈破城為疑故欲穆卜周公知天命有歸疾不由此恐因穆卜以搖四海之心故辭二公而願以身代武王也如訓穆為敬而有和則失考甚矣若爾三王是有丕子之責于天以旦代某之身按新安陳氏曰蔡氏謂任保護之責于天未然惟不用師説所以疑于天之下有缺文朱子語録云此一段先儒都錯了只有朝以道説得好他解丕子之責如史傳中責其侍子之責蓋言上帝責三王之侍子侍子謂武王也上帝責其來服事左右故周公乞代其死言如爾三王是有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若旦多材多藝不能事鬼神不如且留他在世上定爾之子孫與四方之民文意如此公將不利于孺子嘗與友人季彭山偹論此事謂周公攝政自武王時始蓋武王末受命事皆委于周公誅討伐奄戮飛亷滅國五十皆周公之功也君臣兄弟之間相信久矣不惟武王信之朝臣亦必信之不惟朝臣信之天下亦必信之若謂管蔡忿周公專攝而遂欲興殷此雖至愚必不為也大率管蔡之流言非以周公不軌之罪撼成王也蓋亦本文王三分天下有其二以服事殷之意謂周公處商不若文王之盡善恐頑民未服大難將作必將貽害于幼主故流言而曰公將不利于孺子不知武王滅殷本于天命非私意也天命既歸周有何不利故大誥多方反復明天意以導之尹兹東夏注謂宋亳在東故曰東夏自豐鎬言之則宋在東但不當連亳言耳宋即隋之宋州唐之睢陽郡宋升應天府今為歸德府若亳則鄭玄以為偃師皇甫謐以為梁國穀熟縣或云濟隂亳縣並與宋無干孟侯朕其弟小子封詩序言衛不能修方伯連帥之職則康叔為方伯信為諸侯之長矣以此書小子字故先儒皆謂康叔受封時尚幼按武王年九十三而終克商後七年而崩則克商時已八十六嵗及至分封近九十矣康叔與武王周公皆太姒之子安得尚幼今陜右之俗凡尊命卑貴命賤雖長且老者皆以小子呼之親愛之詞也此所謂小子亦必如此弘于天注訓天為理所從出殊覺牽強荀子富國篇引書曰𢎞覆乎天若德裕乃身則此脫一覆字外事汝陳時臬事師司兹殷罰有倫新安陳氏曰左傳定公四年有曰武王之母弟八人周公為太宰康叔為司冦則康叔以諸侯入為王朝之卿明矣吕氏外事內事之説極當蔡氏何必疑之而乃添出異時成王或舉以任司冦之職一句適以助後世成王封康叔之疑師司殷罰有倫者正是初得天下初分封時事若是後來何必師用殷罰為哉乃穆考文王穆敬也詩曰穆穆文王是也或曰文王世以為穆亦通新安陳氏謂昭穆之穆與左傳合不易之論若以為穆穆之穆則詩稱武王曰率見昭考此昭字又何訓耶穆穆之詩不可引以為證厥或告曰羣飲蔡謂羣飲者商民羣聚而飲為姦惡者也又曰羣飲蓋亦當時之法有羣聚飲酒謀為大姦者其詳不可得而聞矣曰為姦惡又曰謀為大姦皆因本文殺字而疑之也意謂若非大姦罪何足殺不知殺即殺三苗于三危之殺非謂盡殺之也况曰豫其殺更有審定而未必殺乎按史記注云漢律三人以上無故羣飲罰金故賜酺得會聚飲食羣飲正此類也梓材首節其綱領也汝若恆越曰一節所謂以厥臣也王啓監一節所謂以厥庶民也稽田一節正舉是而喻之耳今王以下即康叔答王之詞故曰作兄弟方來惟王子子孫孫永保民和懌先後迷民于衛國尤切蓋迷于紂者在先迷于武庚者在後也若兹監正與王啓監相應蔡以後監為視非也惟曰若稽田既勤敷災惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤朴斫惟其塗丹雘此正以上三節功夫望康叔圗終而歷喻之也重在疆畎塗塈茨塗丹雘上稽田喻治外作室喻治內梓材喻內之制作蘇氏訓敷為治陳氏訓敷為開墾孫灸訓災為去草敷災者謂治去草棘也無廣字意以疆為畔原是孔氏舊注止據左傳如耕之有畔遂以畔訓疆畢竟疆非畔也疆是田岸畎是廣尺深尺之溝皆耕者所必須卑曰垣高曰墉泥飾曰塗仰塗曰塈茨亦不獨是蓋穀梁傳焚雍門之茨范寧注茨謂茅蓋屋也雘采色之名有青有朱丹雘則是朱飾者三勤字重三者之譬言武王既勤勞以始之叔當罔厲殺人母胥戕母胥虐以成就潤飾之也誥告庶殷越自乃御事蔡以御事為指成王非也御事者庶殷之御事也觀下文云王先服殷御事其意可想矣蓋諴民必先服殷事故告庶殷亦自乃御事也我二人共貞貞即厥賦貞之貞謂卜也若以為正殊無意義亂為四輔注謂宗周之四輔漢三輔本諸此非也按漢三輔乃指地言謂京兆馮翊扶風三郡也周之四輔乃王制所謂設四輔及三公四輔謂左輔右弼前疑後丞耳君子所其無逸注訓所為處本吕東萊之説當時朱晦翁亦譏其太巧按説文引詩伐木所所訓所為用力楊用修云所猶勉也西土人謂用力于有事為所召誥王敬作所與此義同似覺明順言乃雍坊記引此書作言乃歡謂言出而人歡悅之猶所謂言而民莫不信也蔡訓雍為和其義較淺弗克經歷嗣前人恭明德恭明不平明由恭而出明德即所謂前人光也心營曰經躬承曰歷繼述曰嗣三字亦不平在武丁時則有若甘盤蔡引蘇氏謂在武丁時不言傅説豈傅説不配食于配天之主乎此説非也此處皆説舊臣故惟舉甘盤文王不言太公高宗不言傅説皆一意也率惟兹有陳保乂有殷故殷禮陟配天陳陳告也承上六臣而言率惟此道有所陳白以保乂有殷故殷之禮升其有德之主以配天如以陟為升遐則陟丕釐上帝之耿命豈亦升遐乎王來自奄注謂成王即政之明年商奄又叛成王征滅之非也武王時周公誅紂伐奄三年討其君而其地即封伯禽為魯國矣成王初年所以至奄者為武庚叛也周公懼殷遺民與淮夷徐戎合勢故奉成王至奄經略三年而東方始定即周公東征事而東山詩稱三年不歸者是也多士所稱昔朕來自奄大降爾四國民命者蓋指管蔡霍及殷耳非兼奄也當時奄已為魯安得復叛乎洪舒于民舒荼二字古通用詩荆舒是懲史記年表引作荆荼是其證也王伯厚引古文正作洪荼謂大為民之荼毒此意却勝天惟五年須暇之子孫注以五年為紂非也五年就武庚説故曰須暇之子孫夫上不曰六下不曰四而惟曰五年有的據矣按武王十有三年克殷克殷二年王有疾逸周書云武王克殷乃立王子祿父俾守商祀設三監俾監殷是殷祀猶未絶也武王崩三監挾殷以畔成王元年六月葬武王于畢二年作師東征降辟三叔王子祿父北奔殷祀始絶自克商至此凡五年蓋當時猶未改殷號至封微子始改稱宋云奔走臣我監五祀先臣三叔後臣康叔至今凡五年而殷民又叛故作洛遷之此始遷也綴衣虎賁注謂執射御者曰虎賁今按夏官虎賁氏掌先後王而趨舍則守王間在國則守王宫有大故則守王門並無執射御之事乃有室大競籲俊尊上帝蔡訓室為王室恐與下迪知忱恂不相接當依孔氏謂夏時卿大夫家大強猶招呼俊賢以尊事上帝如此則上下文勢皆順太史司冦蘇公注謂蘇國名左傳蘇忿生以溫為司冦按地志云溫已姓蘇忿生所封溫即孟州溫縣是溫為國名蘇乃姓也越玉五重左傳大路越席所以藉寶也越玉五重者謂以越席藉玉凡用五重慎之至也按周書武警篇武王將崩出金枝郊寶開和細書命詔周公旦立後嗣屬小子誦文及寶與今成王將終亦越玉五重陳寶正行此禮也惟周文武誕受羑若注以羑為羑里于若字難通况説文王猶可説武王益謬矣按説文羑進善也羑若者從善順諫之義此説為優馬氏曰羑進也若順也大受天道而順之也王釋冕反喪服朱子曰朝廷之禮與庶人不同蓋以天命及宗廟社稷為重故太甲祗見厥祖必易以喪服見由來久矣注引蘇氏一段可刪政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢政本諸身故貴有恆辭布于下故尚體要凡立言必有體王言之體當簡要故曰體要今曰趨完具而已此訓不明靡靡則非有恆利口則非體要惟吕命王享國百年耄荒度作刑以詰四方書緯稱穆王以吕侯為相惟吕命者惟吕侯之命猶言惟説命也穆王享國五十五年壽百嵗當依蘇氏以耄為句荒度依荒度土功一樣看蓋穆王悔其巡遊而命吕侯訓刑有改過之意故孔子録之一篇大意儘自有條若古有訓至惟腥言苗民承蚩尤之亂而淫刑也皇帝哀矜至惟明言舜懲苗之虐而用德也乃命三后二節言羣臣輔舜之德明德感而後始命臯陶制刑見刑之不得已耳四方司政至惟永則言當以苖為戒以伯夷為勉而其所當勉者惟在勤敬也有邦有土以下先言擇人敬刑度及者舉其要也兩造具備至有要正言用刑之事罰懲以下申擇人也察辭以下申敬刑也獄成以下申度及也百官族姓以下又言用刑之本與兩造具偹以下相應嗣孫以下則告後世耳其言有條其理甚正蔡傳乃深非之則不考之故也大辟疑赦其罰千鍰閲實其罪按舜典金作贖刑古人五金皆謂之金非必黃金也故注疏以為銅吕刑之千鍰注疏以為黃鐵皆謂銅也正義謂古之贖罪者皆用銅漢始用黃金但少其斤兩令與銅相敵故鄭玄駁異義言贖死罪千鍰鍰六兩為三百七十五斤故知為銅也漢及後魏贖罪皆用黃金後魏以金難得令金一兩收絹十匹今律用穀及銅錢亦是此意蔡以舜止贖輕刑而此五刑皆贖遂著論非之不知疑赦而後贖又欲閲實其罪則亦非淫刑矣魯人三郊三遂東郊不開以拒守故曰三郊番番良士族力既愆我尚有之仡仡勇夫射御不違我尚不欲良士傳以為蹇叔以理度之當指百里奚勇夫必指公子縶子桑輩蓋自魯僖公二年晉滅下陽百里奚始入秦其後惟務息兵養民至僖公二十八年始有入滑之師自此一戰外未嘗用兵他皆與晉共成尊王等事耳此篇當作于其時雖獲晉君足以見將勇兵強之效而非其休養之初心也故穆公深悔而夫子取焉邵堯夫謂夫子知秦之繼周故録秦誓小之乎窺聖人也其思斷斷之臣數語豈惟可以治秦國雖治天下亦不過此書以秦誓終雖謂其不愧典謨可也尚書砭蔡編
